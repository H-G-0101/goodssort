  <!--
    REMOVIDO p/ rodar offline:
      - msstart SDK (https://assets.msn.com/...)  -> nao usado pelo jogo
      - <link rel="manifest" ...gamedistribution> -> 404 local
    SUBSTITUIDO:

        (os SDKs reais estao em /vendor para estudo)
  -->
  <!-- ===== CiDi Storage SDK: init() ANTES de tudo (localStorage do Pi Browser) ===== -->
  <!-- URL versionada p/ evitar cache velho (recomendacao da doc CiDi). -->
  <!-- spy de storage removido: embrulhar Storage.prototype divergia do localStorage real do CiDi -->

  <script src="https://app.cidi.games/sdk/cidi-sdk.js?v=20260427-expose-init-await-pi-init-1"></script>
  <script>
  /* Padrao do 2248 Nexum (que funciona no Pi Browser):
       1) dispara CiDiSDK.init() e ESPERA (await) -> storage do Pi fica disponivel
       2) RE-LE o save persistido e reaplica no jogo + atualiza a UI
     O jogo carrega normal (defer) e le o localStorage cedo (pode vir vazio);
     a re-leitura pos-init recupera o estado. Sem mirror, sem hook, sem guardiao. */
  window.__cidiInitState = 'pending';
  window.__cidiReady = (async function () {
    var ok = false;
    try {
      if (window.CiDiSDK && typeof CiDiSDK.init === 'function') {
        // init() as vezes NUNCA resolve no Pi Browser -> corremos com timeout p/ nao travar
        var timeout = new Promise(function (res) { setTimeout(function () { res('timeout'); }, 6000); });
        // a API expoe ensurePiReady - o init pode depender do Pi SDK estar pronto
        try { if (typeof CiDiSDK.ensurePiReady === 'function') { await Promise.race([CiDiSDK.ensurePiReady(), new Promise(function(res){setTimeout(res,4000);})]); console.log('[CiDi-Storage] ensurePiReady ok'); } } catch (e) { console.warn('[CiDi-Storage] ensurePiReady falhou', e); }
        var r = await Promise.race([CiDiSDK.init().then(function () { return 'ok'; }), timeout]);
        ok = (r === 'ok');
        window.__cidiInitState = ok ? 'ok' : 'timeout';
        console.log('[CiDi-Storage] init() -> ' + r);
      } else {
        window.__cidiInitState = 'absent';
        console.warn('[CiDi-Storage] CiDiSDK ausente (dev/offline)');
      }
    } catch (e) {
      window.__cidiInitState = 'failed';
      console.warn('[CiDi-Storage] init falhou:', e && (e.message || e.code));
    }
    // re-le SEMPRE (mesmo se o init nao resolveu): melhor tentar que nao fazer nada
    try { reloadPersistedState(); } catch (e) { console.warn('[CiDi-Storage] reload falhou', e); }
    return ok;
  })();

  /* SUBSTITUI saveUserData: o do bundle grava via uma referencia de localStorage capturada
     no boot; o CiDi troca o objeto apos o init, entao aquelas escritas se perdem.
     Nossa versao grava no window.localStorage ATUAL (o mesmo que o test save usa e que
     comprovadamente persiste). Mesma chave, mesmo conteudo (game.data). */
  (function () {
    var KEY = 'grocery-store_sgk';
    var iv = setInterval(function () {
      var gm = window.__game;
      if (!gm || typeof gm.saveUserData !== 'function' || gm.__patched) return;
      clearInterval(iv);
      gm.__patched = 1;
      gm.saveUserData = function () {
        if (window.__resetting) return;        // reset em andamento: nao regravar
        try {
          // grava SO o que interessa (stats). O game.data completo carrega rankingList,
          // levelConfigs etc e pode estourar a quota do Pi Browser -> setItem falha em silencio.
          var payload = JSON.stringify({ stats: gm.data.stats });
          window.localStorage.setItem(KEY, payload);
          window.__saves = (window.__saves || 0) + 1;
          window.__saveBytes = payload.length;
          // verificacao imediata
          var back = window.localStorage.getItem(KEY);
          window.__saveOk = (back === payload) ? 'MATCH' : ('MISMATCH ' + (back ? back.length : 0) + 'b');
        } catch (e) {
          window.__saveErr = (e && (e.name + ': ' + e.message)) || 'err';
          console.warn('[CiDi-Storage] save falhou', e);
        }
      };
      console.log('[CiDi-Storage] saveUserData substituido (localStorage atual)');
      // salva o estado corrente imediatamente + a cada 2s e ao sair
      gm.saveUserData();
      window.__autoSaveId = setInterval(function () { try { gm.saveUserData(); } catch (e) {} }, 2000);
      ['pagehide', 'beforeunload', 'blur'].forEach(function (ev) {
        window.addEventListener(ev, function () { try { gm.saveUserData(); } catch (e) {} });
      });
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') { try { gm.saveUserData(); } catch (e) {} }
      });
    }, 30);
    setTimeout(function () { clearInterval(iv); }, 20000);
  })();

  /* HARD RESET: usado pelo botao "apagar progresso". No Pi Browser o reload demora e o
     auto-save (2s) + os saves de pagehide/blur regravavam a chave antes da pagina morrer.
     Aqui: trava os saves, mata o timer, apaga as chaves, confere, e so entao recarrega. */
  window.__hardReset = function () {
    try { window.__resetting = 1; } catch (e) {}
    try { if (window.__autoSaveId) clearInterval(window.__autoSaveId); } catch (e) {}
    try {
      var gm = window.__game;
      if (gm) { gm.saveUserData = function () {}; }   // neutraliza qualquer save pendente
    } catch (e) {}
    function wipe() {
      try { window.localStorage.removeItem('grocery-store_sgk'); } catch (e) {}
      try { window.localStorage.removeItem('grocery-store_cidi'); } catch (e) {}
    }
    wipe();
    // confere e repete: em alguns browsers a remocao so vale apos um tick
    setTimeout(function () {
      wipe();
      var left = null;
      try { left = window.localStorage.getItem('grocery-store_sgk'); } catch (e) {}
      console.log('[CiDi-Storage] hard reset -> chave ' + (left ? 'AINDA EXISTE' : 'apagada'));
      try { window.location.replace(window.location.pathname + window.location.search); }
      catch (e) { window.location.reload(); }
    }, 120);
  };

  /* Re-le o save apos o storage ficar disponivel (Pi iOS/Browser).
     Espera o jogo existir, reaplica game.data e refresca as cenas ativas. */
  function reloadPersistedState() {
    if (window.__resetting) return;      // reset em andamento: nao restaurar nada
    var SAVE_KEY = 'grocery-store_sgk';
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      var gm = window.__game;
      if (!gm || !gm.data || !gm.data.stats) {
        if (tries > 300) { clearInterval(iv);}   // jogo nunca apareceu -> libera
        return;
      }
      clearInterval(iv);
      try {
        var raw = localStorage.getItem(SAVE_KEY);
        if (!raw) { console.log('[CiDi-Storage] sem save persistido (1a vez)'); return; }
        var saved = JSON.parse(raw);
        if (!saved || !saved.stats) return;
        // recupera se o DISCO tem mais progresso que o jogo (cobre o caso do save de boot
        // com defaults ter sido gravado antes do init resolver)
        var dLv = saved.stats.currentCommonLevel || 0, gLv = gm.data.stats.currentCommonLevel || 0;
        var dC = saved.stats.coins || 0, gC = gm.data.stats.coins || 0;
        console.log('[CiDi-Storage] disk lvl' + dLv + 'c' + dC + ' | game lvl' + gLv + 'c' + gC);
        if (dLv > gLv || (dLv === gLv && dC > gC)) {
          gm.data.stats = saved.stats;      // aplica so os stats (payload novo e {stats})
          console.log('[CiDi-Storage] estado recuperado pos-init');
          try {
            gm.scene.scenes.forEach(function (sc) {
              if (sc.sys && sc.sys.isActive && sc.sys.isActive()) {
                if (typeof sc.updateInfo === 'function') sc.updateInfo();
                if (sc.LevelManager && typeof sc.LevelManager.updateBoosters === 'function') sc.LevelManager.updateBoosters();
              }
            });
          } catch (e) {}
        }
      } catch (e) {
        console.warn('[CiDi-Storage] reload erro', e);
      }
    }, 50);
    setTimeout(function () { clearInterval(iv);}, 12000);   // rede de seguranca
  }
  </script>

  <!-- SPLASH imediata no lugar do spinner: fundo lavanda + logo do jogo.
       Some quando o canvas do Phaser aparece (a splash nativa assume). -->
  <div id="loader" style="display:flex;align-items:center;justify-content:center;
       background:linear-gradient(160deg,#ddd6f6,#cfc6ef);">
    <img src="assets/splash-logo.png?v=175" alt="Grocery Store"
         style="width:72%;max-width:440px;height:auto;filter:drop-shadow(0 6px 18px rgba(60,40,110,0.25));">
  </div>
  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
