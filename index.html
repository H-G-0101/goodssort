<!doctype html>
<html lang="pt-BR">
<head>
  <style>#loader{pointer-events:none}</style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grocery Store</title>

  <!-- CSS local (originalmente apontava p/ assets/style.css do CDN) -->
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/css/aeria_ymenu.css" />
  <link rel="icon" href="assets/favicon.ico" />

  <!-- truque do jogo p/ pre-carregar a fonte inter -->
  <div style="font-family:inter; position:absolute; left:-1000px; visibility:hidden;">.</div>

  <!--
    REMOVIDO p/ rodar offline:
      - msstart SDK (https://assets.msn.com/...)  -> nao usado pelo jogo
      - <link rel="manifest" ...gamedistribution> -> 404 local
    SUBSTITUIDO:
      - azerion-libs.js + azerion-integration-sdk.js -> sdk-stub.js (offline)
        (os SDKs reais estao em /vendor para estudo)
  -->
  <script src="sdk-stub.js?v=51"></script>
  <script src="libs/phaser.min.js" defer="true"></script>
  <script src="boot-counter-bridge.js?v=51" defer="defer"></script>
  <script src="shop-bridge.js?v=51" defer="defer"></script>
  <script src="pause-bridge.js?v=51" defer="defer"></script>
  <script src="settings-bridge.js?v=51" defer="defer"></script>
  <script src="levelend-bridge.js?v=51" defer="defer"></script>
  <script src="menu-bridge.js?v=51" defer="defer"></script>
  <script src="plus-coins-bridge.js?v=51" defer="defer"></script>
  <script src="daily-reward-bridge.js?v=51" defer="defer"></script>
  <script src="gameplay-score-bridge.js?v=51" defer="defer"></script>
  <script src="combo-legend-bridge.js?v=51" defer="defer"></script>
  <script defer="defer" src="game/grocery-store.min.js?v=51"></script>
</head>
<body>
  <!-- header/menu do portal yahoo removido (iframe externo que nao carrega local) -->
  <div id="app"><div id="game-container"></div></div>
  <div id="loader"><div id="loaderR"></div></div>
  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
</body>
</html>
