  <!--
    REMOVIDO p/ rodar offline:
      - msstart SDK (https://assets.msn.com/...)  -> nao usado pelo jogo
      - <link rel="manifest" ...gamedistribution> -> 404 local
    SUBSTITUIDO:

  -->
  <!-- ===== CiDi Storage SDK: init() ANTES de tudo (localStorage do Pi Browser) ===== -->
  <!-- URL versionada p/ evitar cache velho (recomendacao da doc CiDi). -->
  <!-- spy de storage removido: embrulhar Storage.prototype divergia do localStorage real do CiDi -->

  <script src="https://app.cidi.games/sdk/cidi-sdk.js?v=20260427-expose-init-await-pi-init-1"></script>
  <script>
  /* Dispara CiDiSDK.init() imediatamente, ANTES do game.
     No Pi Browser/iOS o localStorage so funciona depois que o init resolve;
     como os assets sao pesados (Phaser+atlas ~8MB), o init resolve a tempo do 1o save.
     Expoe window.__cidiReady (Promise) p/ o cidi-storage-bridge fazer a re-leitura de seguranca.
     Se o SDK nao carregar (offline/estudo), segue normal sem travar o jogo. */
  window.__cidiReady = new Promise(function (resolve) {
    var settled = false, done = function (ok) { if (!settled) { settled = true; window.__cidiInitState = ok ? 'ok' : 'failed'; resolve(ok); } };
    window.__cidiInitState = 'pending';
    try {
      if (window.CiDiSDK && typeof CiDiSDK.init === 'function') {
        console.log('[CiDi-Storage] init() chamado (ANTES do game)');
        CiDiSDK.init()
          .then(function () { console.log('[CiDi-Storage] init() OK (storage pronto)'); done(true); })
          .catch(function (e) { console.warn('[CiDi-Storage] init() FAILED', e); done(false); });
      } else {
        console.warn('[CiDi-Storage] CiDiSDK ABSENT (offline/dev)');
        done(false);
      }
    } catch (e) { console.warn('[CiDi-Storage] init error', e); done(false); }
    setTimeout(function () { if (!settled) { console.warn('[CiDi-Storage] init TIMEOUT 8s -> fallback (storage may be ephemeral!)'); done(false); } }, 8000);
  });
  </script>

  <!-- persistencia: NENHUMA camada nossa. O jogo salva/carrega sozinho no localStorage,
       e CiDiSDK.init() (acima, antes do game) torna isso persistente no Pi Browser.
       Padrao identico ao 2248 e demais single-file que funcionam. -->

  <!-- O GAME e carregado por JS, SO DEPOIS que CiDiSDK.init() resolver.
       Motivo: init() e assincrono; com defer o jogo lia/gravava o localStorage ANTES do
       storage do Pi Browser estar habilitado -> nada persistia. Padrao do nuts-and-bolts. -->
  <script>
  (function () {
    function loadGame() {
      if (window.__gameLoaded) return; window.__gameLoaded = 1;
      var s = document.createElement('script');
      s.src = 'game/grocery-store.min.js?v=161';
      s.async = false;
      document.body.appendChild(s);
      console.log('[CiDi-Storage] game carregado apos init()');
    }
    // espera o init (Promise exposta acima). Fallback 8s pra nunca travar o jogo.
    var done = false;
    function go(tag) { if (done) return; done = true; console.log('[CiDi-Storage] boot do game (' + tag + ')'); loadGame(); }
    // precisa de DUAS coisas: init resolvido E Phaser carregado (phaser.min.js tem defer)
    function whenPhaser(cb) {
      if (window.Phaser) return cb();
      var iv = setInterval(function () { if (window.Phaser) { clearInterval(iv); cb(); } }, 30);
      setTimeout(function () { clearInterval(iv); cb(); }, 15000);
    }
    try {
      (window.__cidiReady || Promise.resolve(false)).then(function (ok) {
        whenPhaser(function () { go('init=' + ok); });
      });
    } catch (e) { whenPhaser(function () { go('erro'); }); }
    setTimeout(function () { whenPhaser(function () { go('timeout8s'); }); }, 8000);
  })();
  </script>

<body>
  <!-- header/menu do portal yahoo removido (iframe externo que nao carrega local) -->
  <div id="app"><div id="game-container"></div></div>
  <!-- SPLASH imediata no lugar do spinner: fundo lavanda + logo do jogo.
       Some quando o canvas do Phaser aparece (a splash nativa assume). -->
  <div id="loader" style="display:flex;align-items:center;justify-content:center;
       background:linear-gradient(160deg,#ddd6f6,#cfc6ef);">
    <img src="assets/splash-logo.png?v=161" alt="Grocery Store"
         style="width:72%;max-width:440px;height:auto;filter:drop-shadow(0 6px 18px rgba(60,40,110,0.25));">
  </div>
  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
</body>
