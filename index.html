  <!-- ===== CiDi Storage SDK: init() ANTES de tudo (localStorage do Pi Browser) ===== -->
  <!-- URL versionada p/ evitar cache velho (recomendacao da doc CiDi). -->
  <script>
  /* SPY DE STORAGE - roda ANTES de tudo. Nao altera comportamento; so LOGA quem apaga/grava
     a chave do save, com stack, p/ o painel dbg mostrar. Remover no build final. */
  (function () {
    var KEY = 'grocery-store_sgk';
    try {
      var proto = Object.getPrototypeOf(localStorage) || Storage.prototype;
      var _set = proto.setItem, _rm = proto.removeItem, _clr = proto.clear;
      proto.setItem = function (k, v) {
        if (k === KEY) { try { console.log('[CiDi-Persist] setItem(' + k + ') bytes=' + String(v).length); } catch(e){} }
        return _set.apply(this, arguments);
      };
      proto.removeItem = function (k) {
        if (k === KEY) {
          var st = ''; try { st = (new Error()).stack || ''; } catch (e) {}
          console.warn('[CiDi-Persist] removeItem(' + k + ') !!! CULPRIT: ' + st.split('\n').slice(1,4).join(' | '));
        }
        return _rm.apply(this, arguments);
      };
      proto.clear = function () {
        var st = ''; try { st = (new Error()).stack || ''; } catch (e) {}
        console.warn('[CiDi-Persist] localStorage.clear() !!! CULPRIT: ' + st.split('\n').slice(1,4).join(' | '));
        return _clr.apply(this, arguments);
      };
      console.log('[CiDi-Persist] storage spy armed');
    } catch (e) { console.warn('[CiDi-Persist] spy failed', e); }
  })();
  </script>
  <script src="https://app.cidi.games/sdk/cidi-sdk.js?v=20260427-expose-init-await-pi-init-1"></script>
  <script>
  /* Dispara CiDiSDK.init() imediatamente, ANTES do game.
     No Pi Browser/iOS o localStorage so funciona depois que o init resolve;
     como os assets sao pesados (Phaser+atlas ~8MB), o init resolve a tempo do 1o save.
     Expoe window.__cidiReady (Promise) p/ o cidi-storage-bridge fazer a re-leitura de seguranca.
     Se o SDK nao carregar (offline/estudo), segue normal sem travar o jogo. */
  window.__cidiReady = new Promise(function (resolve) {
    var settled = false, done = function (ok) { if (!settled) { settled = true; window.__cidiInitState = ok ? 'ok' : 'failed'; resolve(ok); } };
    window.__cidiInitState = 'pending';
    try {
      if (window.CiDiSDK && typeof CiDiSDK.init === 'function') {
        console.log('[CiDi-Storage] init() chamado (ANTES do game)');
        CiDiSDK.init()
          .then(function () { console.log('[CiDi-Storage] init() OK (storage pronto)'); done(true); })
          .catch(function (e) { console.warn('[CiDi-Storage] init() FAILED', e); done(false); });
      } else {
        console.warn('[CiDi-Storage] CiDiSDK ABSENT (offline/dev)');
        done(false);
      }
    } catch (e) { console.warn('[CiDi-Storage] init error', e); done(false); }
    setTimeout(function () { if (!settled) { console.warn('[CiDi-Storage] init TIMEOUT 8s -> fallback (storage may be ephemeral!)'); done(false); } }, 8000);
  });
  </script>

  <!-- ===== PERSISTENCIA INLINE (CiDi Storage) - sempre junto do index, no-cache ===== -->
  <script>

/* PERSISTENCIA CiDi - versao SIMPLES (igual v65, que funcionava; 2248/Bus Jam pattern).
   O jogo salva sozinho no localStorage; init() (no head) torna isso persistente no Pi.
   Aqui so RE-LEMOS o save apos o init, caso o jogo tenha bootado com defaults antes do
   storage ficar pronto. SEM hook no saveUserData, SEM mirror, SEM anti-clobber (essas
   camadas do v71+ quebraram o save nativo). Best-effort. + flush leve no fechar. */
(function () {
  var SAVE_KEY = 'grocery-store_sgk';
  var done = false;
  function g() { return window.__game; }
  function findKey() {
    try {
      if (localStorage.getItem(SAVE_KEY) != null) return SAVE_KEY;
      for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.slice(-4) === '_sgk') return k; }
    } catch (e) {}
    return SAVE_KEY;
  }
  function refresh() {
    try {
      var gm = g(); if (!gm || !gm.scene || !gm.scene.scenes) return;
      gm.scene.scenes.forEach(function (sc) {
        try { if (sc.sys && sc.sys.isActive && sc.sys.isActive()) {
          if (typeof sc.updateInfo === 'function') sc.updateInfo();
          if (sc.LevelManager && typeof sc.LevelManager.updateBoosters === 'function') sc.LevelManager.updateBoosters();
        } } catch (e) {}
      });
    } catch (e) {}
  }
  function recover() {
    if (done) return;
    var gm = g(); if (!gm || !gm.data || !gm.data.stats) return;
    done = true;
    try {
      var raw = localStorage.getItem(findKey());
      var disk = raw ? JSON.parse(raw) : null;
      if (disk && disk.stats) console.log('[CiDi-Persist] DISK save on boot -> level ' + disk.stats.currentCommonLevel + ' coins ' + disk.stats.coins);
      else console.log('[CiDi-Persist] no disk save yet (fresh).');
      console.log('[CiDi-Persist] GAME loaded -> level ' + gm.data.stats.currentCommonLevel + ' coins ' + gm.data.stats.coins);
      var bootedFresh = gm.data.stats.firstLoad === true;
      // so restaura se o disco tiver MAIS progresso que o estado atual (evita puxar um save lv1 velho)
      var diskLv = disk && disk.stats ? (disk.stats.currentCommonLevel || 0) : 0;
      var gameLv = gm.data.stats.currentCommonLevel || 0;
      var savedReal = disk && disk.stats && disk.stats.firstLoad === false && diskLv >= gameLv;
      if (bootedFresh && savedReal) {
        gm.data = disk;
        console.log('[CiDi-Storage] persisted state restored after init.');
        refresh();
      } else {
        console.log('[CiDi-Storage] save already loaded correctly at boot (nothing to do).');
      }
    } catch (e) { console.warn('[CiDi-Storage] recover failed', e); }
  }
  // flush leve ao fechar/minimizar: pede pro PROPRIO jogo salvar (nao sobrescreve nada)
  function flush() { try { var gm = g(); if (gm && typeof gm.saveUserData === 'function') gm.saveUserData(); } catch (e) {} }
  ['pagehide','beforeunload','freeze'].forEach(function (ev) { try { window.addEventListener(ev, flush, { capture: true }); } catch (e) {} });
  try { document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'hidden') flush(); }, { capture: true }); } catch (e) {}

  (window.__cidiReady || Promise.resolve(false)).then(function () {
    var iv = setInterval(function () {
      if (done) { clearInterval(iv); return; }
      if (g() && g().data && g().data.stats) { clearInterval(iv); recover(); }
    }, 30);
    setTimeout(function () { clearInterval(iv); }, 15000);
  });
  console.log('%c[CiDi-Storage]', 'color:#2bb583', 'persistence SIMPLE (re-read after init, native save).');

  // MIRROR SIMPLES: o jogo grava o save no boot mas nao o atualiza depois (DISK ficava lv1).
  // Copiamos game.data -> disco a cada 1s (e ao fechar). NAO tocamos em saveUserData
  // (envolve-lo quebrou o save nativo em v71+). So escrevemos quando ha progresso real.
  (function () {
    var KEY = 'grocery-store_sgk', lastLv = null;
    function g() { return window.__game; }
    function isFresh(d) {
      if (!d || !d.stats) return true; var s = d.stats;
      return (s.currentCommonLevel || 1) <= 1 && !(s.coins > 0) && !(s.score > 0);
    }
    function write() {
      try {
        var gm = g(); if (!gm || !gm.data || !gm.data.stats) return;
        if (isFresh(gm.data)) return;                 // nunca sobrescreve com defaults
        localStorage.setItem(KEY, JSON.stringify(gm.data));
        var lv = gm.data.stats.currentCommonLevel;
        if (lv !== lastLv) { lastLv = lv; console.log('[CiDi-Persist] mirror saved -> level ' + lv + ' coins ' + gm.data.stats.coins); }
      } catch (e) {}
    }
    setInterval(write, 1000);
    ['pagehide','beforeunload','freeze','blur'].forEach(function (ev) { try { window.addEventListener(ev, write, { capture: true }); } catch (e) {} });
    try { document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'hidden') write(); }, { capture: true }); } catch (e) {}
  })();


  // OBSERVADOR PASSIVO: nao toca no save do jogo; so verifica a cada 1s se a chave existe/mudou.
  // Assim vemos no dbg se o jogo esta escrevendo no disco.
  (function () {
    var last = null;
    setInterval(function () {
      try {
        var raw = localStorage.getItem('grocery-store_sgk');
        var lv = raw ? (JSON.parse(raw).stats || {}).currentCommonLevel : null;
        var sig = raw ? ('lv' + lv + ':' + raw.length) : 'NONE';
        if (sig !== last) {
          last = sig;
          if (raw) console.log('[CiDi-Persist] disk save WRITTEN -> level ' + lv + ' (bytes ' + raw.length + ')');
          else console.warn('[CiDi-Persist] disk save MISSING (game is not writing)');
        }
      } catch (e) {}
    }, 1000);
  })();

})();

  </script>

  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
