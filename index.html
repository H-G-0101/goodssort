  <!--
    REMOVIDO p/ rodar offline:

  <!-- ===== CiDi Storage SDK: init() ANTES de tudo (localStorage do Pi Browser) ===== -->
  <!-- URL versionada p/ evitar cache velho (recomendacao da doc CiDi). -->
  <!-- spy de storage removido: embrulhar Storage.prototype divergia do localStorage real do CiDi -->

  <script src="https://app.cidi.games/sdk/cidi-sdk.js?v=20260427-expose-init-await-pi-init-1"></script>
  <script>
  /* Padrao do 2248 Nexum (que funciona no Pi Browser):
       1) dispara CiDiSDK.init() e ESPERA (await) -> storage do Pi fica disponivel
       2) RE-LE o save persistido e reaplica no jogo + atualiza a UI
     O jogo carrega normal (defer) e le o localStorage cedo (pode vir vazio);
     a re-leitura pos-init recupera o estado. Sem mirror, sem hook, sem guardiao. */
  window.__cidiReady = (async function () {
    var ok = false;
    try {
      if (window.CiDiSDK && typeof CiDiSDK.init === 'function') {
        await CiDiSDK.init();
        ok = true;
        console.log('[CiDi-Storage] init() OK - storage pronto');
      } else {
        console.warn('[CiDi-Storage] CiDiSDK ausente (dev/offline)');
      }
    } catch (e) { console.warn('[CiDi-Storage] init falhou:', e && (e.message || e.code)); }
    try { reloadPersistedState(); } catch (e) { console.warn('[CiDi-Storage] reload falhou', e); }
    return ok;
  })();

  /* Re-le o save apos o storage ficar disponivel (Pi iOS/Browser).
     Espera o jogo existir, reaplica game.data e refresca as cenas ativas. */
  function reloadPersistedState() {
    var SAVE_KEY = 'grocery-store_sgk';
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      var gm = window.__game;
      if (!gm || !gm.data || !gm.data.stats) { if (tries > 300) clearInterval(iv); return; }
      clearInterval(iv);
      try {
        var raw = localStorage.getItem(SAVE_KEY);
        if (!raw) { console.log('[CiDi-Storage] sem save persistido (1a vez)'); return; }
        var saved = JSON.parse(raw);
        if (!saved || !saved.stats) return;
        var bootedFresh = gm.data.stats.firstLoad === true;
        var savedReal = saved.stats.firstLoad === false;
        console.log('[CiDi-Storage] disk lvl' + saved.stats.currentCommonLevel + ' | game lvl' + gm.data.stats.currentCommonLevel);
        if (bootedFresh && savedReal) {
          gm.data = saved;                        // adota o estado persistido
          console.log('[CiDi-Storage] estado recuperado pos-init');
          try {
            gm.scene.scenes.forEach(function (sc) {
              if (sc.sys && sc.sys.isActive && sc.sys.isActive()) {
                if (typeof sc.updateInfo === 'function') sc.updateInfo();
                if (sc.LevelManager && typeof sc.LevelManager.updateBoosters === 'function') sc.LevelManager.updateBoosters();
              }
            });
          } catch (e) {}
        }
      } catch (e) { console.warn('[CiDi-Storage] reload erro', e); }
    }, 50);
  }
  </script>

  <!-- SPLASH imediata no lugar do spinner: fundo lavanda + logo do jogo.
       Some quando o canvas do Phaser aparece (a splash nativa assume). -->
  <div id="loader" style="display:flex;align-items:center;justify-content:center;
       background:linear-gradient(160deg,#ddd6f6,#cfc6ef);">
    <img src="assets/splash-logo.png?v=162" alt="Grocery Store"
         style="width:72%;max-width:440px;height:auto;filter:drop-shadow(0 6px 18px rgba(60,40,110,0.25));">
  </div>
  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
