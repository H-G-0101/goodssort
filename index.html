  <script>
  /* buffer de logs cedo: o painel (defer) carrega depois do inline; sem isso as linhas
     [CiDi-Persist] do boot/mirror nunca apareceriam na tela. */
  window.__cidiEarlyLogs = [];
  (function () {
    ['log','warn','error'].forEach(function (m) {
      var o = console[m] ? console[m].bind(console) : function(){};
      console[m] = function () {
        try {
          var s = Array.prototype.slice.call(arguments).map(function(x){ return typeof x === 'string' ? x : JSON.stringify(x); }).join(' ');
          if (/\[CiDi-/.test(s)) window.__cidiEarlyLogs.push(s.replace(/%c/g,'').replace(/color:[^;]+;?(font-weight:bold)?/g,'').trim());
        } catch(e){}
        return o.apply(null, arguments);
      };
    });
  })();
  </script>

  <script>
  /* Dispara CiDiSDK.init() imediatamente, ANTES do game.
     No Pi Browser/iOS o localStorage so funciona depois que o init resolve;
     como os assets sao pesados (Phaser+atlas ~8MB), o init resolve a tempo do 1o save.
     Expoe window.__cidiReady (Promise) p/ o cidi-storage-bridge fazer a re-leitura de seguranca.
     Se o SDK nao carregar (offline/estudo), segue normal sem travar o jogo. */
  window.__cidiReady = new Promise(function (resolve) {
    var settled = false, done = function (ok) { if (!settled) { settled = true; window.__cidiInitState = ok ? 'ok' : 'failed'; resolve(ok); } };
    window.__cidiInitState = 'pending';
    try {
      if (window.CiDiSDK && typeof CiDiSDK.init === 'function') {
        console.log('[CiDi-Storage] init() chamado (ANTES do game)');
        CiDiSDK.init()
          .then(function () { console.log('[CiDi-Storage] init() OK (storage pronto)'); done(true); })
          .catch(function (e) { console.warn('[CiDi-Storage] init() FAILED', e); done(false); });
      } else {
        console.warn('[CiDi-Storage] CiDiSDK ABSENT (offline/dev)');
        done(false);
      }
    } catch (e) { console.warn('[CiDi-Storage] init error', e); done(false); }
    setTimeout(function () { if (!settled) { console.warn('[CiDi-Storage] init TIMEOUT 8s -> fallback (storage may be ephemeral!)'); done(false); } }, 8000);
  });
  </script>

  <!-- ===== PERSISTENCIA INLINE (CiDi Storage) - sempre junto do index, no-cache ===== -->
  <script>

/* PERSISTENCIA v92 - MIRROR AUTONOMO.
   Cada peca em seu proprio try/catch e em seu proprio IIFE: se uma falhar, as outras seguem.
   O MIRROR e a peca essencial (grava game.data no disco). Nao toca em saveUserData. */

/* 1) MIRROR v98: usa o PROPRIO saveUserData() do jogo.
   Motivo: escrever direto no localStorage nao persistia (nossa referencia diverge da que o
   jogo usa). O saveUserData() do bundle grava pelo caminho correto - o mesmo que produziu o
   save de boot. Entao so PEDIMOS pro jogo salvar periodicamente e ao fechar. */
(function () {
  var lastSig = null;
  // pega o Game REAL a partir de uma cena ativa (window.__game pode ser outra instancia)
  function realGame() {
    var gm = window.__game;
    try {
      if (gm && gm.scene && gm.scene.scenes) {
        for (var i = 0; i < gm.scene.scenes.length; i++) {
          var sc = gm.scene.scenes[i];
          if (sc && sc.sys && sc.sys.isActive && sc.sys.isActive() && sc.game) return sc.game;
        }
      }
    } catch (e) {}
    return gm;
  }
  function g() { return realGame(); }
  function save(tag) {
    try {
      var gm = g();
      if (!gm || !gm.data || !gm.data.stats) { window.__mirror = window.__mirror || {}; window.__mirror.last = 'no __game'; return; }
      var st = gm.data.stats;
      window.__mirror = window.__mirror || {};
      window.__mirror.ticks = (window.__mirror.ticks || 0) + 1;
      if ((st.currentCommonLevel || 1) <= 1 && !(st.coins > 0) && !(st.score > 0)) { window.__mirror.last = 'skip fresh'; return; }
      if (typeof gm.saveUserData !== 'function') { window.__mirror.last = 'no saveUserData'; return; }
      gm.saveUserData();                       // <<< canal correto (o mesmo do jogo)
      window.__mirror.writes = (window.__mirror.writes || 0) + 1;
      window.__mirror.last = 'saveUserData lvl' + st.currentCommonLevel + ' c' + st.coins + ' @' + (tag || 'tick');
      window.__mirror.sameGame = (gm === window.__game) ? 'same' : 'DIFFERENT!';
      try { var raw = window.localStorage.getItem('grocery-store_sgk'); window.__mirror.afterSave = raw ? ('lvl' + (JSON.parse(raw).stats||{}).currentCommonLevel) : 'none'; } catch(e){}
      var sig = st.currentCommonLevel + ':' + st.coins;
      if (sig !== lastSig) { lastSig = sig; console.log('[CiDi-Persist] saveUserData -> lvl ' + st.currentCommonLevel + ' coins ' + st.coins); }
    } catch (e) { window.__mirror = window.__mirror || {}; window.__mirror.err = (e && e.message) || 'err'; }
  }
  try { setInterval(function () { save('tick'); }, 1000); } catch (e) {}
  ['pagehide', 'beforeunload', 'blur'].forEach(function (ev) { try { window.addEventListener(ev, function () { save(ev); }); } catch (e) {} });
  try { document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'hidden') save('hidden'); }); } catch (e) {}
  console.log('[CiDi-Persist] mirror armed (saveUserData 1s + on close)');
})();

/* 2) RECOVER: apos o init, se o jogo bootou fresh mas ha save melhor no disco, reaplica. */
(function () {
  var KEY = 'grocery-store_sgk', done = false;
  function g() { return window.__game; }
  function refresh() {
    try {
      var gm = g(); if (!gm || !gm.scene || !gm.scene.scenes) return;
      gm.scene.scenes.forEach(function (sc) {
        try {
          if (sc.sys && sc.sys.isActive && sc.sys.isActive()) {
            if (typeof sc.updateInfo === 'function') sc.updateInfo();
            if (sc.LevelManager && typeof sc.LevelManager.updateBoosters === 'function') sc.LevelManager.updateBoosters();
          }
        } catch (e) {}
      });
    } catch (e) {}
  }
  function recover() {
    if (done) return;
    var gm = g(); if (!gm || !gm.data || !gm.data.stats) return;
    done = true;
    try {
      var raw = window.localStorage.getItem(KEY);
      var disk = raw ? JSON.parse(raw) : null;
      console.log('[CiDi-Persist] DISK on boot -> ' + (disk && disk.stats ? ('lvl ' + disk.stats.currentCommonLevel + ' coins ' + disk.stats.coins) : 'none'));
      console.log('[CiDi-Persist] GAME on boot -> lvl ' + gm.data.stats.currentCommonLevel + ' coins ' + gm.data.stats.coins);
      var diskLv = disk && disk.stats ? (disk.stats.currentCommonLevel || 0) : 0;
      var gameLv = gm.data.stats.currentCommonLevel || 0;
      if (disk && disk.stats && diskLv > gameLv) {
        gm.data = disk;
        console.log('[CiDi-Persist] restored from disk -> lvl ' + diskLv);
        refresh();
      }
    } catch (e) { console.warn('[CiDi-Persist] recover error: ' + (e && e.message)); }
  }
  try {
    (window.__cidiReady || Promise.resolve(false)).then(function (ok) {
      console.log('[CiDi-Persist] init resolved: ' + ok);
      var iv = setInterval(function () {
        if (done) { clearInterval(iv); return; }
        if (g() && g().data && g().data.stats) { clearInterval(iv); recover(); }
      }, 50);
      setTimeout(function () { clearInterval(iv); }, 15000);
    });
  } catch (e) { console.warn('[CiDi-Persist] recover hook error'); }
})();

  </script>

  <script>
  /* remove o overlay #loader (spinner) quando o jogo aparece.
     sem isso, ele fica por cima (z-index 99) e bloqueia o arrasto. */
  (function(){
    function gone(){ var l=document.getElementById('loader'); if(l) l.remove(); }
    function ready(){
      var c=document.querySelector('#game-container canvas')||document.querySelector('canvas');
      if(c){ gone(); return true; } return false;
    }
    var iv=setInterval(function(){ if(ready()) clearInterval(iv); },200);
    setTimeout(function(){ clearInterval(iv); gone(); },8000); // fallback
  })();
  </script>
